[awk-language-server]
fetch.url = "https://github.com/Beaglefoot/awk-language-server/archive/refs/tags/server-$ver.tar.gz"
src.github_tag = "Beaglefoot/awk-language-server"
src.include_regex = "server-.*"
src.prefix = "server-"

[css-variables-language-server]
fetch.url = "https://github.com/vunguyentuan/vscode-css-variables/archive/refs/tags/css-variables-language-server%40$ver.tar.gz"
src.github_tag = "vunguyentuan/vscode-css-variables"
src.include_regex = "css-variables-language-server@.*"
src.prefix = "css-variables-language-server@"
url.name = "css-variables-language-server-$ver.tar.gz"

[guihua-lua]
fetch.github = "ray-x/guihua.lua"
src.branch = "master"
src.git = "https://github.com/ray-x/guihua.lua"

[schemastore-nvim]
fetch.github = "B0o/SchemaStore.nvim"
src.branch = "main"
src.git = "https://github.com/B0o/SchemaStore.nvim"

[ts-error-translator-nvim]
fetch.url = "https://github.com/dmmulroy/ts-error-translator.nvim/archive/refs/tags/v$ver.tar.gz"
src.github = "dmmulroy/ts-error-translator.nvim"
src.prefix = "v"

[vim-jb-lua]
fetch.github = "ms0503/vim-jb.lua"
src.branch = "main"
src.git = "https://github.com/ms0503/vim-jb.lua"

[vimdoc-ja]
fetch.github = "vim-jp/vimdoc-ja"
src.branch = "master"
src.git = "https://github.com/vim-jp/vimdoc-ja"
